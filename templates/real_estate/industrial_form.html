{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-4xl space-y-5">
  <div class="flex items-center justify-between gap-3">
    <div>
      <p class="text-sm text-slate-500">{{ project.name }}</p>
      <h1 class="text-2xl font-bold text-slate-950">{{ title }}</h1>
    </div>
    <a class="btn-secondary" href="{% url 'real_estate_dashboard' %}?project={{ project.id }}">رجوع للداشبورد</a>
  </div>
  <form method="post" class="panel">
    {% csrf_token %}
    <div class="grid gap-4 md:grid-cols-2">
      {% for field in form %}
        <label class="{% if field.name == 'next_step' %}md:col-span-2{% endif %}">
          <span class="text-sm font-medium text-slate-700">{{ field.label }}</span>
          {{ field }}
          {% if field.errors %}<span class="mt-1 block text-sm text-rose-700">{{ field.errors|join:", " }}</span>{% endif %}
        </label>
      {% endfor %}
    </div>
    <div class="mt-6 flex justify-end gap-2">
      <a class="btn-secondary" href="{% url 'real_estate_dashboard' %}?project={{ project.id }}">إلغاء</a>
      <button class="btn-primary" type="submit">حفظ التعديلات</button>
    </div>
  </form>
</div>
<script>
  document.querySelectorAll('input, select, textarea').forEach((field) => {
    field.classList.add('input');
  });
</script>
{% endblock %}
